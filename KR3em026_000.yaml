body:
  text: 總論夫左為咽屬胃右為喉屬肺乃一身百會之關呼吸出入之門內經云一陰一陽結而為痹一陰者手少陰君火心之脈氣也一陽者手少陽相火三焦之脈氣也二脈共絡於喉氣熱則內結結甚則腫脹脹甚則氣痛痹者不仁之謂此喉痹之所由名而乳蛾喉閉纏喉等症皆痹類也有風寒火濕毒虛之別或風火相搏或寒暑相聚其症變幻不一如漫腫而多痰風與濕也痰白而牙緊風寒也紫色不腫而爛者風伏寒也紅腫而脈浮者風火也脈沉實爛而不腫者毒也脈細數而浮者虛火也脈細而緩者虛寒也六者之脈象可類推也大凡初起之症診右寸洪緊肺風也兩關浮數胃火肝風也左寸浮洪心火也右寸沉遲肺伏寒也右寸沉細肺伏熱也右尺洪大三焦火旺也左尺浮洪而有力腎虛火炎也六脈大略論治俱可用六味湯加減症若囚險脈宜細診再察形窮原對症用藥自然可愈經云神聖功巧不過望聞問切細心推詳庶無誤耳喉症分經喉有二孔左為咽屬胃納食之關右為喉屬肺納氣之關口內上齶屬胃陰下齶屬脾陽舌之中屬心四圍屬脾舌根亦屬心小舌又名帶丁屬胃左右舌根屬肝外兩耳垂下亦屬肝牙根上屬胃下屬脾舌苔白主寒黃主熱焦熱甚黑熱極凡舌苔不單論色但有津者非真熱不可概投涼藥宜引火歸原大舌邊乃脾火可用清涼之劑喉癰部位屬肝再連內寸許或爛或腫俱屬脾胃火毒之症結毒亦有之但結毒者兩關脈必沉若兩關脈浮非結毒也此分經大略咽喉治法要論送者當審其病由參之時令必須大涌其痰去痰之法先備溫水使病人漱口如點刺或吹藥令其垂頭流出痰涎俟痰涎少止仍以溫水頻頻漱之如虛弱人及病勢重者須要著人扶好或用銀針刺其患處風熱則散之火症則清之甚者下之陰寒者溫之若初起驟用寒涼之藥則上熱未除中寒復生其毒乘虛而入即喘不休死不救矣大抵風熱症十之七八火症十之二三寒症十無一二也病昏沉痰多氣急飲食不進發熱不退牙關緊閉脈息微弱者症為重人事不省痰氣上攻聲如雷鳴嗆食眼張天柱倒陷面色焦黑鼻如煙煤張煽不止目睛突出汗出如雨咽喉干痛聲啞無痰手足麻足麻至膝蓋發喘及呃脈息如絲乃死症也臨症用藥生死反掌醫者不可懷希異之心故意延挨病者不可起懈怠之念以致決裂古云走馬看咽喉不待少頃者即此之謂也遇症用藥後痰少腫退即愈如已潰用藥後越兩日即可進飲食者三日後無不收功喉癰用藥後患處要變紅色知癢痛有津液潤澤者可治用刀針須向自己醫者方向勾來不可向病人口內剔去咽喉忌下刀之地有四處嚨化啞門穴喉關兩溝上舌下筋若用刀其刀頭上須蘸巳藥或亥申藥庶不作痛臨症先診其脈象輕重後看其患處深淺若脈絕脈怪脈死則毋須用藥矣因毒已入腹非藥力所能挽回也纏喉風及陰虛喉癰二症最險而難治至危而不易識纏喉風內外無形其患在關內上面有紅絲如未入心尚可用藥如已入心則不治凡遇此症宜早治在一日半日之內可保無虞陰虛喉癰如癩蛤蟆皮形有青白點子高低大小狀如暑天痱子其症總危延日最久或一年半載而死或一月半月而死如起病數日之前治之十症可得九愈看喉腫處其色變紅者即成膿之候可不刺而自潰也喉症用糯米泔水或甘桔湯或薄荷湯俱要溫和為主山楂焙燥磨細末煎藥內可加一撮乃消腫去毒治咽喉之要藥也病人壯者藥可猛弱者攻宜緩刺針不可傷小舌要緊夜晚看症宜倍加細心藥用六味湯天明覆看再為加減凡針舌下兩邊青筋血紅生血黑死宜服清膈消痰解毒之劑四絕症走馬喉風鎖喉風走馬牙疳纏喉風此皆凶險之症若不吐不瀉針之無血藥不能入皆為不治慎之慎之十六絕形舌卷囊縮角弓反張油汗如珠十指無血啞喉嗆食喉干無痰吐血喉癰六脈沉細聲如鋸拽大便不通鼻扇唇青天柱倒塌脈細身涼兩目直視痰壅氣塞喉菌不治針刺穴位頭面頰車穴在耳垂下八分足陽明胃經兩手少商穴在大指內甲角手太陰肺經中衝穴在中指內甲角手厥陰心包絡經少衝穴在小指內甲角手太陽小腸經商陽穴在食指內甲角手陽明大腸經關衝穴在無名指外甲角手少陽三焦經吳氏咽喉二十四大症歌訣今存二十二症喉痹鬱火攻兮喉痹成或生左右小棋形鮮紅酒毒光如鏡痹在喉間風熱勝其症形小而圓初起或內消或針刺皆可如其色紫紅平塌光如鏡者不可刺宜內消因其毒發於本源故也喉閉積熱風痰喉如閉因生血泡在喉間忽然壅塞櫻桃似點刺流涎病即安其症宜發表清熱先用針點後吹子醜藥纏喉風惡寒惡痛名陰毒面外無形氣短促胸前紅腫足多寒若見紅絲針貴刺用藥宜發表吹藥先用巳藥若見紅絲即刺斷再用子藥嗆喉風此症謂之飛絲毒日中發泡醜藥覆燥極無痰熱在心忽然嗆食終非福先用針挑破血泡後上醜藥兼吹子藥煎藥宜清熱祛痰啞喉風啞痹喉症犯咽膈口不言兮牙關塞面紫唇青清涕流風疏痰降即無厄其症牙關緊閉先用巳藥後用申藥前後抹之風痰去盡為度煎藥先發表後清熱弄舌喉風體發熱兮口內腫舌出頻將兩手弄筆直針患處去痰涎解毒疏風清熱壅用三稜針刺破少商穴先用巳藥後用子藥爛喉風爛喉風症頻頻熱唇若塗朱口內裂看其患處淺和深藥宜子醜兼調攝子醜二藥和勻上之再用巳藥收功煎藥宜清熱單乳蛾喉內腫如桃李形或左或右單蛾名此症早治可速退痰消毒散自然平此症不論已成未成皆可刺其形大而長初用巳藥後用子醜二藥收功煎藥先發表後清熱喉癰七情鬱結病成癰六日之內可刺膿不治須防成冷痿巳申藥到定收功其患在喉嚨正中到四五日後可刺早刺防復腫未刺前及未潰前吹藥先用巳藥復用申藥潰後用子醜二藥煎藥先發表後清熱牙疔太陰脾土足陽明二火交攻疔即成患在牙齦如豆大挑針點破即安寧先用申藥後用子藥牙宣此症起時因胃熱壅而宣露常流血藥吹酉未即能除清胃煎來功奏捷先用子藥後用酉藥未藥二種止血煎藥宜清胃火木舌舌病心經受風熱忽然腫破口難說看時左右共宜針藥用桅連火氣滅吹申藥看紫色處用小刀點之出血後吹子藥重舌蓮花之症看如何三舌攢在舌底疴戌藥頻搽宜更點清心瀉火莫蹉跎用申藥吹之不退再用戌藥煎藥宜清熱解毒重齶體總不熱獨心嘈舌上生來似小桃藥用黃連解毒飲吹宜冰片不須刀用子藥吹之走馬牙疳小兒疳症屬於脾黑腐沿開臭不宜子醜合參兼卯藥穿腮落齒總難醫先用米泔水洗淨或溫水亦可用子醜藥和勻敷全如不應乃險症也煎藥用解毒痧痘口疳痘余痧後口生疳爛在牙齦痘毒傳若是見痧生滿口須從心胃二經參吹子醜卯藥煎藥宜瀉心胃二火雙乳蛾雙蛾兩兩生喉間關上輕兮關下難氣吹好似紅李子輕消重刺去風痰形與單蛾同不論已成未成皆可刺先吹巳藥不退再點子藥煎藥先發表後清熱螞蝗疔疼而微白螞蝗疔齶上生來韭菜形內不腫兮發寒熱速宜針刺自然平用申藥點去惡血後上子藥煎藥有表發表無表解毒瀉火連珠風兩溝深處患連珠初起沿開白色余日久漸成八九點藥和子醜病當除和勻子醜巳藥吹之兼上寅藥煎藥宜清熱解毒陰虛喉風癬症原來因損肺斑生苔癬若蝦皮時時發熱頻頻嗽面赤聲嘶病可慮其症陰虛不宜發表須用滋補兼解毒上半天痛甚者乃氣虛下半天痛甚者乃血虛吹卯藥並上醜酉二藥如日久不減者不治楊梅喉癬楊梅結毒癬由生片白喉中穢氣聞白色變黃才可治酉隨子醜共追尋和勻子醜二藥吹入後用酉藥收功煎藥宜用解毒咬牙風咬牙即是鎖喉風毒在牙齦胃火攻不治恐成牙漏症關開辰藥可收功先用辰藥擦牙齦縫中如腫不退再用子藥煎藥宜清熱解毒張氏咽喉七十二症治簾珠喉簾珠喉滿喉如白網細狀兩邊微腫根有白點帶紅色小舌紅腫咽水大痛此症因鬱積熱毒而發其脈兩寸浮洪兩尺亦數大而洪此上盛下虛之症也宜清火用六味湯加鹽炒黃柏六克酒炒黃芩六克鹽炒知母六克石膏十五克山豆根六克鹽炒玄參六克山梔三克木通三克生地六克服一劑來日再加連翹十克紫花地丁十克熟地六克丹皮六克草河車六克川連三克金汁一盅或煎柏枝汁一盅沖服乃妙外吹藥六七日可愈嗆食啞喉此症因伏邪在肺聲啞嗆食六脈遲細屬陰症余曾治一人年二十患此症三年飲食少進病在將危余診視再三病雖久脈尚有力有根或可治用六味湯加麻黃九克桂枝三克蘇葉十克木通三克細辛三克白芷三克訶子六克皂核九克姜炒半夏三克連服至六日病雖退而聲啞未除換加桔梗三十克訶子二十一克甘草二十一克薄荷三克以上俱童便炒麻黃三克煎數沸噙漱徐徐嚥下服十劑乃愈後服補藥健脾內外腫喉此症生於喉關之下陰陽相結內外皆腫或有爛斑火鬱之症用六味湯加炒黃芩六克熟軍十五克海浮石六克外吹藥來日加丹皮四克生地六克酒炒黃芩六克生石膏九克炒山梔三克木通三克針刺少商商陽兩手四穴如背寒加羌活胃泛加粉葛根柏枝汁亦可漱之風熱喉此症感風熱而起滿喉發細紅點根帶淡白舌下兩邊三四塊六脈洪緊用六味湯加鹽炒玄參三克酒炒黃芩六克山梔三克花粉三克一服可愈外用吹藥兼服八仙散紫色虛喉喉間紫紅久之變爛如生漆色因初起早服寒涼之藥故也此症肺胃伏寒平而不腫飲食難進吐出乃腐肉者宜急治之如誤認為火熱之症反以三黃犀角羚羊角等藥則釀成死症矣余見此等紫色之症不論名色喉間絕無影形滿喉皆紫脈緩身涼者用六味湯加細辛一克半葛根蘇葉白芷川芎麻黃各三克服後紫變為紅換加鹽炒玄參三克酒炒黃芩六克花粉六克即愈喉癬此症因腎虛火旺髮癬於喉不腫而微紅上有斑點青白不一如芥子大或針孔綠豆大每點生芒刺入水大痛喉間聲啞咳嗽無痰六脈細數者用知柏地黃湯兼四物湯加麥冬炒玄參鹽炒女貞子枸杞人參洋參二參或前藥不用亦可首烏阿膠各六克十服後用附桂八味丸加女貞枸杞二參俱鹽炒淡鹽湯下每服劑十二克如前知柏地黃湯四物湯服後不應酌加附桂每服各六克冷服此引火歸原之法也如六脈洪數恐難脫體外兼用吹藥治之喉疳此症因腎虛火旺沸騰上部而發喉間上齶有青白紅點平坦無刺故名喉疳聲不啞不咳嗽兩尺脈虛者是也先用六味湯去荊防蠶三味加鹽炒玄參三克酒炒黃芩六克丹皮六克生地六克鹽炒山梔三克鹽炒水拌再炒女貞四克鹽炒知母四克男加龜板十五克女加別甲十五克服五劑或十劑如不愈再加附桂各九克另煎入藥冷服愈後合附桂八味丸加玄參知母女貞枸杞各藥俱鹽水炒服一料可愈外用吹藥飛揚喉此症由風熱上壅上齶紅腫氣不能通咽物不下從小舌中飛揚逐漸至口此係凶惡之症急針患處出血泄氣吹藥內服六味湯加連翹葛根黃柏山梔木通各三克生石膏十二克一二服可愈虛啞喉虛啞喉喉間不腫兩邊關內少有紅點聲啞不明牙關不開此症乃內外風火因喜食酸澀之物肺氣不清故也用六味湯加細辛九克按原文細辛三錢分量過重可能是三分之誤或者有獨到之處細辛臨床應用一般以不超過三克為宜蘇葉三克服一劑聲音不啞換加生地丹皮各六克鹽水炒山梔木通花粉各三克二服愈矣聲啞喉聲啞喉為寒伏肺腑不腫不紅又無爛點總覺干痛難於飲食用六味湯加蘇葉麻黃各六克細辛一點五克二服後麻黃蘇葉各減半再二日換加花粉黃芩羌活姜炒半夏各三克皂核二十粒訶子六克桔梗十五克甘草十五克以上三味皆拌童便炒四五服乃愈初起不可用涼藥此症非三四天不能痊愈爛痧喉爛痧喉發於傷寒之後表邪未盡其喉關內腫爛右關脈急肺脾之症可知用六味湯加酒炒黃芩三克花粉三克鹽炒玄參三克葛根三克生石膏八克淡竹葉六克草河車六克連服四劑如爛斑不褪加生大黃九克津化八仙散玉樞丹每服二克三服可收功雙乳蛾雙乳蛾感肺胃二經之熱而發生於關口上部兩邊如櫻桃大肺胃之症也身發寒熱六脈弦數先針少商商陽兩手四穴或挑破患處出血亦妙用六味湯加陳皮海浮石蘇葉羌活各四克兩服可愈如腫不退六脈有力加大黃九克單乳蛾單乳蛾生於雙蛾地部之旁或左或右六脈浮數因傷寒後邪未散盡身熱噁心恐見痧疹用六味湯加葛根三克蘇葉三克羌活六克鮮芫荽十五克無鮮者用芫荽子十克一服退半來日再加酒炒黃芩六克花粉三克山梔赤芍木通各三克即愈爛乳蛾爛乳蛾因肺胃鬱熱紅腫爛斑大痛難食六脈弦緊宜急針少商商陽兩手四穴用六味湯加葛根六克蘇葉鹽炒玄參各三克炒黃芩六克沖柏枝汁一杯漱喉間徐徐嚥下再用八仙散一服津化下來日去蘇葛二味加山梔木通生地丹皮海浮石花粉各六克脈大有力加生大黃九克脈虛用八仙散同柏枝汁照前吃法三四日可愈如聲啞背寒六味湯加葛根六克蘇葉三克羌活一克細辛點九克治之風寒蛾風寒蛾因風寒而起腫大如李頭不能下垂氣塞不通寸關之脈浮緊肺胃之症也針少商商陽少衝兩手六穴用六味湯加蘇葉十克羌活三克一服可愈若早用涼藥則不能退矣白色乳蛾白色乳蛾腫塞滿口身發寒熱六脈浮弦此肺受風寒之症也六味湯加蘇葉六克細辛點九克羌活六克一服可愈石蛾石蛾因胎生本原不足所致生於乳蛾部位少進半寸初生不可用涼藥不可動針刀此乃肝火老痰結成惡血凡遇辛苦即發用六味湯加貝母三克生地六克牛蒡子三克麥冬三克木通三克服四五劑如不退去六味用生地四克丹皮三克象貝母三克甘草牛蒡子各三克桔梗二克麥冬三克木通二克薄荷六克燈心草一克服以愈為度外吹退腫藥伏寒乳蛾伏寒之症其乳蛾色紫治法同紫色喉癰見前紫色虛喉如孕婦喉癰慮服藥有礙將藥煎濃漱喉吐出亦可愈爛喉痹爛喉痹因肝胃熱毒外感時邪而發形如花瓣爛腫白斑痛叫不食目晴上泛六脈洪大速針少商商陽關衝少衝兩手八穴有血生無血死用六味湯加生大黃六克鹽炒黃芩六克入酒少許玄參六克鹽炒生地六克丹皮三克海浮石六克山梔三克木通三克兩服後去大黃用六味湯再加生石膏十克訶子四克整柏子仁用柏枝汁制六克四服可愈並服八仙散六克津化下此症若脈細身涼不治白色喉痹白色喉痹因肺胃受寒脈遲身熱用六味湯加細辛點六克羌活六克蘇葉陳皮各三克二服可愈若變紅色干痛去前四味換加山梔木通酒炒黃芩生地黃柏各三克痰多加海浮石半夏花粉各三克寒伏喉痹寒伏喉痹為肺經寒重色紫亦不大腫脈緩若誤服涼藥久之必爛凡遇紫色者不可作火治用六味湯加細辛一點五克麻黃桂枝蘇葉栝蔞訶子牛蒡子各三克甚者吐出紫血塊治法亦同未爛者加蘇葉六克細辛一點五克柴胡海浮石各三克腫與不腫同治雙喉痹雙喉痹生於上齶關內兩邊形如欖核痛而難食胃經積熱所致或發寒熱兩關脈洪大者是也速針患處或少商穴亦可先用六味湯一服來日再加黃芩山梔木通炒玄參各五克一服可退爛者不可針但於患處用吹藥單喉痹單喉痹或左或右治法同雙喉痹淡紅喉痹淡紅喉痹腫似雞子飲食不下身發寒熱眼紅嘔吐恐有斑毒在內急針少商商陽關衝少衝左右八穴或患處挑破用六味湯加蘇葉羌活葛根各六克鮮芫荽十五克服一劑滿身發出痧疹嘔吐即止或身熱不退喉外亦腫此內火外泄也用六味湯換加生大黃六克葛根黃芩山梔玄參花粉各六克生石膏十五克滑石六克二服後去大黃石膏再服四五劑可愈有爛斑用八仙散一服津化下兼服柏枝汁此症因傷寒時邪未消之故兩關脈沉細兩寸尺脈虛數者是也走馬喉痹走馬喉痹內外俱腫此係急症肝脾火閉不通而為痹或發寒熱脈洪大者生沉細者死用六味湯加葛根六克柴胡三克細辛一點五克漱之再加皂角刺六克歸尾六克赤芍六克草河車六克生軍十五克痰多加海浮石九克製半夏六克身熱惡寒加羌活三克蘇葉三克急刺少商商陽關衝兩手六穴血多為妙內腫鎖喉風內腫鎖喉風由肺胃兩經陰陽相結內塞不通外無形跡喉內多痰喘先用灌吐法見下面纏喉風再用六味湯加麻黃六克生軍十五克細辛三克蘇葉六克桂枝三克羌活六克煎數沸服或瀉或吐為妙如不吐不瀉針少商商陽關衝曲池合谷左右十穴有血者生無血者死左右關寸脈弦緊洪大者生沉遲者死吹吊痰藥曲池穴在肘曲橫紋頭臂之外側合谷穴在虎口背側大指與食指合界之端纏喉風纏喉風因肺感時邪風痰上壅陰陽閉結內外不通如蛇纏緊關下壅塞甚者角弓反張牙關緊閉先用開關藥吹鼻擦牙以吐為度再速針頰車左右兩穴艾灸數壯或用雞蛋清沖白礬灌之以上諸法如不吐再針少商商陽關衝少衝少陰有血為度無血不治用六味湯加生軍三十克麻黃羌活蘇葉訶子各六克煎灌服或瀉或吐皆妙如不吐即針之針而無血六脈沉細者不治吹用膽礬去痰藥匝舌喉風匝舌喉風生於喉之上下兩邊迫於小舌有泡或紅或紫外臉皆腫喉內不腫舌根粗大此惡症也痊者甚少用六味湯加黃連三克黃芩六克生軍十二克連翹六克沖玉樞丹三克急進三四服或有可生如牙關黑腫齒落頭搖不治此症乃肺肝積毒所致虛爛喉風虛爛喉風因本源不足虛火上炎生於喉之關內上下紅色白斑痛爛不腫六脈細數是也初起用六味湯加鹽炒玄參六克酒炒黃芩六克炒山梔花粉各三克生地十克丹皮六克兩服後去六味湯加鹽炒知母黃柏各三克服五劑如兩關脈大作結毒治外吹藥並服八仙散白色喉風白色喉風因寒包火伏於肺經白而不腫上有紅紫爛斑脈象不數身熱畏寒火欲外發用六味湯加葛根六克麻黃三克蘇葉三克柴胡二克花粉四克桂枝羌活各三克一二服兼八仙散一服津化下患處變紅色換加鹽炒玄參六克酒炒黃芩六克炒山梔木通各三克兩服可痊愈紫色喉風同此治法酒毒喉風酒毒喉風因醇酒厚味所致生於關內紅腫痰多咽物不下肺脈獨遲兩關皆大用六味湯加生甘草三十克葛根三克海浮石九克花粉六克枳椇子九克山梔三克煎湯嗽之來日再加鹽炒玄參生地丹皮各六克四服可痊並吹退腫藥勞碌喉風勞碌喉風肝腎兩虛發於關內滿口有紅點根白不腫常有血腥氣勞碌即發脈象數而中空為芤脈是也用六味湯加鹽炒玄參六克鹽炒知母六克生地六克丹皮木通各三克來日再加連翹酒炒黃芩花粉各三克山梔三克兩日後去六味湯換煎方鹽炒玄參六克女貞子四克生地四克麥冬四克炒黃芩三克丹皮六克枸杞六克龜板九克生首烏十五克生甘草三克二服可愈外吹消散藥酒寒喉風酒寒喉風因酒後受寒關內兩邊平而不腫有淡紅塊四五處咽物覺痛身無寒熱六脈洪大用六味湯加花粉六克枳椇子六克酒炒黃芩六克葛根三克兩服可愈腫爛喉風腫爛喉風因風火內熾肺胃脈洪數用六味湯加葛根花粉各三克如紅爛不退藥不能入再用六味湯加淡豆豉木通山梔鹽炒知母各六克花粉當歸柏子仁各三克丹皮六克生地四克海浮石九克柏枝汁一杯沖藥服五六劑而安外吹消散藥肺寒喉風肺寒喉風因肺受重寒生在關內下部兩邊如扁豆殼樣平而不腫大痛難食不穿不爛畏寒怕冷右寸關弦緊用六味湯加羌活蘇葉各六克當歸柴胡牛蒡子桂枝各三克細辛一點五克兩服可愈辛苦喉風辛苦喉風因日夜勞苦而發不腫不太紅但微紅而痛小舌左右常出血上部之脈洪緊用六味湯加鹽炒玄參酒炒黃芩各三克山梔六克木通三克連翹六克火重者加生地六克鹽炒知母六克丹皮澤瀉花粉各三克三服可愈外吹消散藥淡紅喉風淡紅喉風由肺胃感冒風邪而發腫連小舌喉塞不通聲音不清右手關脈弦緊宜針少商關衝少衝兩手六穴急者患處亦可挑破用六味湯加羌活蘇葉葛根各六克一服可愈伏寒喉癰伏寒喉癰因積寒在內外感時邪而發其色紅腫或帶紫色脈浮不數用六味湯加羌活葛根草河車穿山甲赤芍歸尾各三克細辛一點五克兩服後去羌活葛根加山梔三克五日可愈腫爛喉癰腫爛喉癰因脾家積熱而生紅腫潰爛兩手關脈洪大者是也針少商商陽關衝少衝兩手八穴血多為妙先服八仙散放舌上津化下再用六味湯加鹽炒玄參六克鹽炒黃柏三克酒炒黃芩三克生大黃九克山梔木通各三克草河車六克煎服瀉過去大黃再服三日後用十八味神藥柏枝汁咽漱即愈外兼用吹藥淡白喉癰淡白喉癰因肺脾受寒其色不紅若用涼劑七日之內必成膿有膿即針破初起腫針少商商陽兩手四穴出紫血用六味湯加蘇葉赤芍歸尾各五克一服加穿山甲皂角刺草河車各六克再服可愈此症六脈緊身發寒熱者是也大紅喉癰大紅喉癰為脾肺積熱其色鮮紅腫脹關內六脈洪大身發寒熱急針少商商陽或刺患處出惡血用六味湯加山梔木通各三克海浮石生大黃各九克歸尾皂角刺草河車各九克赤芍花粉黃芩各四克先將十一味煎二三十沸後下六味湯同煎兩服可安聲啞喉癰聲啞喉癰因受寒太重肺脈閉塞以致聲啞飲食難進或有爛斑右寸脈沉澀脾胃脈洪大畏寒身熱用六味湯加羌活六克葛根蘇葉各三克漱之二日後聲音不啞換加花粉三克乳香二克葛根酒炒黃芩歸尾赤芍穿山甲皂角刺各九克再服八仙散玉樞丹兩服可愈單喉癰單喉癰或左或右身熱惡寒脾胃之症也有紅點風熱無紅點風寒脈象如前六味湯加蘇葉羌活各六克漱咽一服來日再加赤芍歸尾山豆根山梔各四克服一劑可愈外症喉癰外症喉癰生於頜下天突穴之上內外皆腫飲食有礙初起無痰涎內不見形跡此風毒之癰也六味湯加黃芩皂角刺山甲歸尾赤芍草河車各六克紅花葛根各三克乳香二克連三服以消為度已成出膿必成瘻管用十全大補湯收功兜腮喉癰兜腮喉癰生於腮下其名懸癰因鬱積寒氣而發外用灸法二壯用六味湯加山甲歸尾皂角刺川芎白芷各三克升麻一克紅花乳香各二克以消為度有膿針之若成瘻管多用參苓耆內托或可收功此症不可輕意疏忽舌上癰舌上癰生於舌中心如梅子大不能言語此症熱入心包絡而發左寸脈宜洪大數不宜細緩紅腫可治黑者不治六味湯加川連三克連翹草河車各十五克生軍十二克地丁九克外吹牛黃消散藥以愈為度舌下癰舌下癰乃脾腎積熱而發然舌下有金津玉液二穴通於腎經水枯方生此症診其左尺洪數者是也六味湯加生地草河車各六克葛根花粉丹皮各三克玄參六克兩服用十八味神藥收功吹藥如前上齶癰上齶癰有如桃核掛下不能飲食因肺家炙煿之毒積久而發宜用解毒之劑加草河車九克石膏十五克地丁生地各六克歸尾山甲赤芍皂角刺各四克丹皮花粉葛根各三克七八服兼玉樞丹每日二克並用吹藥據理或遲至二三月收功亦有之木舌木舌因心脾肝三經積熱舌粗紫脹不能言語此多食炙煿所致急刺出紫血搽吹藥用大承氣湯兼黃連解毒湯加山梔木通連翹花粉各六克赤芍草河車各九克兩服後應加生軍瀉毒再用六味湯漱口吐出左右寸關脈洪大者屬實症可治六脈細者屬虛症難治白腫舌白腫舌因風寒積內六脈弦緊舌腫硬痛六味湯加細辛一克蘇葉四克白芷六克當歸四克川芎葛根各三克如有白苔黑點而滑者用淡附子乾薑各二克煎服外用乾薑冰片麝香青皮各等分為末搽患處爛邊舌爛邊舌因脾經濕熱不清大舌邊上發疳白點而爛六味湯加小生地六克滑石九克淡竹葉三克前仁豬苓各四克澤瀉車前甘草梢各三克服兩劑外用吹藥唇牙內腫爛同此治法紅點紫舌紅點紫舌因心脾二經熱極所致滿口紅點紫色作爛而痛或身有赤斑六味湯加石膏三十克葛根四克川連三克黃芩六克黃柏三克木通山梔各三克甚者加生軍九克如六脈不數不可用此方外用吹藥搽患處純紫舌純紫舌因傷寒用蔥酒發汗酒毒入心以致大舌純紫宜用升麻葛根各三克枳椇子六克石膏六克川連八克滑石人中黃各九克木通三克如心煩加山梔淡豆豉各三克噁心欲吐恐防發斑加芫荽三十克又用芫荽沖燒酒揉背心為妙外用吹藥座舌蓮花座舌蓮花因脾經熱毒積久而發生於牙齦內面走竄如蓮花一座急針患處出血搽吹藥再針左右少商穴用六味湯加草河車六克歸尾赤芍各三克川連連翹各三克生軍九克山梔木通各三克生地六克穿山甲三克生石膏十五克服兩劑如不退用十八味神藥收功重舌重舌大舌之下又生小舌以致大舌反粗短小舌長痛此心脾之毒左寸右關兩部脈洪大者是也久之必爛爛則難愈初起即針出惡血搽吹藥服黃連解毒湯加生軍十五克如瀉五六日即愈玉樞丹十八味神藥亦可服蓮花舌蓮花舌因心脾之火飛騰舌底即針刺小舌出血吹藥用三黃石膏湯加甘草二克草河車六克外針商陽穴即愈焦黃舌焦黃舌因嗜酒太過遇寒而起大舌乾黃用三黃湯加枳椇子生石膏人中黃身發寒熱用大柴胡湯加羌活三克如嘔吐心煩脈洪大加生軍十二克佐以牛蒡子赤芍葛根之類再無不應舌上珠此心脾積熱舌生白泡大小不一六脈洪大搽吹藥用三黃湯加石膏十克草河車六克地丁三克兼服玉樞丹二克如六脈遲細者不可用前藥舌下珠此脾腎兩虛之症六味湯加鹽炒玄參生地鹽炒知母黃柏木通各等分按一般六至十克為宜煎服兼搽吹藥余藥照前左雀舌左雀舌因多食煎炒炙煿之物積毒於胃故發於舌之旁似生小舌位近牙齦初起針破出血搽吹藥用六味湯加三黃湯清膈散即涼隔散治之久之必爛用龍骨生肌散收功右雀舌右雀舌亦因積毒治法如左雀舌大同小異用六味湯加犀角地黃湯治之搽藥同前胃火小舌胃火小舌因脾經火毒郁久而發小舌生白點爛胃脈浮用六味湯加生石膏一百二十克酒炒黃芩六克花粉九克葛根六克山梔三克兩服如不愈用吹藥兼服柏枝汁此乃多食炙煿醇酒厚味或魚骨刺傷非結毒可比須診脈浮洪者屬胃火脈沉實者屬結毒詳辨為要胃毒小舌胃毒小舌因毒結胃經發於小舌形如前症胃脈沉實而洪大者是結毒臨症不可疏忽有紅腫爛者治法亦同前用十八味神藥同玉樞丹三克土茯苓每日一百二十克煎湯代茶多吃為妙如一月不愈宜合結毒紫金丹一料沖玉樞丹同服土茯苓湯下每晚九克可收功積熱小舌積熱小舌因肝胃二經火毒飛騰所以小舌長硬白衣裹滿咽物不下右關脈浮大六味湯加山梔三克連翹六克酒炒黃芩六克黃柏四克生石膏十克滑石六克赤芍木通葛根各三克草河車六克外吹藥兼用玉樞丹二三次無不愈懸旗小舌懸旗風生小舌下垂尖頭似桂圓核大紅如爛桃胃脈浮洪多因食厚味火酒以致胃火鬱盛而發六味湯加甘草二克枳椇子六克赤芍六克草河車六克兩服可愈如腫處出血用吹藥純白小舌純白小舌因胃經積毒小舌忽變白色軟大而腫痛右關脈洪沉先用玉樞丹每服二克或十服或五服銀花湯下再用土茯苓煎湯代茶如胃脈不沉反洪大作火症看用六味湯加生石膏六克酒炒黃芩車前各六克山梔三克木通三克滑石九克葛根九克天花粉三克山豆根六克三服此即一症兩治之法臨症細參脈理然後用藥慎之慎之松子喉疔松子喉疔生於關內小舌左右兩邊形如松子淡紅而硬大痛難食背寒身熱兩寸關脈緊乃風火鬱積之症也六味湯加蘇葉赤芍羌活連翹穿山甲草河車各三克來日去蘇葉羌活二味加乳香一克玉樞丹三克研細沖服二日可愈外兼用吹藥走馬牙疳走馬牙疳因脾經積受熱毒太重而起牙肉先腫日久腐爛此為急症齒落肉黑不治脈浮洪者生沉細者死脈大而有力尚可用重劑救之脈遲細者藥不能投臨症詳脈治之初起未爛即針腫處出血搽吹藥已爛不必針搽吹藥用川連葛根連翹犀角生地各六克白蘚皮甘草貝母花粉各四克生石膏三十克草河車三十克入大鍋煎服三四碗連服三劑如脈數便結加生軍三十克或可救遲則不治矣喉單喉單因肝火鬱熱動風而生關口上部下垂根大頭小紅色大痛先針兩邊患處出血吹藥漱六味湯一服來日加柴胡鉤藤赤芍生地丹皮草河車各三克連翹黃芩黃連各三克煎服可愈喉菌喉菌因胎毒所致或因心胃火邪生於喉內如菌樣故名喉菌不可用刀針服黃連解毒湯玉樞丹可使其不發熱然未見全消者喉瘤喉瘤因鬱怒傷肝或迎風高叫或本源不足或誦讀太急以致氣血相凝生於關內不時而發治以調本養原之藥玉樞丹地黃丸俱可常服難許速愈外用吹藥又喉瘤生於關外治法同前陰瘡陰瘡生於頰車之下或左或右內熱外寒皮色不變身發寒熱腫大如鰻鯉瘟六味湯加萬靈丹同藥化下如變紅色用喉癰藥治之便結加生軍九克玉樞丹亦可服症屬少陰心腎則如此法若症屬少陽膽三焦用柴胡牛蒡子並六味湯漱之附方六味湯桔梗生甘草防風荊芥穗殭蠶薄荷八仙散人中白三十克生軍三十六克生石膏十五克玄參三十克酒炒黃芩四十二克玄明粉二十一克殭蠶九克瓜硝二十四克輕粉三克用時宜慎共為末用煉蜜為錠每重六克舌津化下玉樞丹山慈姑六十克洗淨為末麝香九克大戟淨末十五克草河車淨末十五克五倍子淨一百二十克千金子淨末三十克共為末米飲調和搗千餘下為度每服一至二克甚者三克十八味神藥川連二克白蘚皮二克黃芩六克酒炒地丁六克當歸六克草河車六克山梔三克半生龜板九克木通三克生甘草六克川芎四克連翹六克乳香一克去油銀花五克皂角刺四克知母六克鹽水炒結毒加土茯苓鮮首烏火症爛喉加生石膏大黃各十二克知柏地黃丸地黃山萸肉山藥茯苓丹皮澤瀉知母黃柏犀角地黃湯生地黃山萸肉山藥茯苓丹皮澤瀉石膏犀角按此方非千金方所載犀角地黃湯系自創處方三黃湯黃連黃柏黃芩俱鹽水炒可加石膏炒山梔涼膈散連翹三克大黃六克芒硝三克甘草三克炒山梔五克半黃芩四克薄荷三克竹葉十片按和劑局方涼膈散無竹葉四物湯川芎當歸生地白芍附桂八味九即六味地黃丸加製附子肉桂冷服大承氣湯大黃十五克芒硝十克厚朴五克枳實五克黃連解毒湯黃連三克炒山梔二克黃柏二克黃芩三克大柴胡湯大黃黃芩半夏白芍柴胡枳實生薑大棗子藥明硃砂二克硼砂十五克梅冰片二克制玄明粉十五克研末治喉中潰爛長肉生肌生新去腐醜藥雄黃精三克梅冰片二克膽礬一克火煅研末治口內腐爛用少許不宜多孕婦忌用寅藥青黛三十克人中白十五克黑山梔十五克梅冰片三克厚朴十五克切片用黑棗一百五十克去核包厚朴火上煅存性共研末治口疳如神如遇傷寒後口疳另加坑磚一角火煅研末十五克卯藥梅冰片三克雄黃精三克靛花六克玄明粉六克硼砂十五克粉甘草三克川黃連六克人中白九克煨存性銅青十五克煅黃柏三克蜜炙雞內金三克鈔紙二張煅存性枯礬三克鹿角霜三十克研末能解毒退腫生肌去腐治陰虛喉癬更佳辰藥上好膽礬冬月取青魚膽汁和勻成塊陰乾刮下用瓷瓶收貯其藥過一二年可用研末治牙關緊閉食不能進口不能開用雞毛蘸抹兩牙底令其流出痰涎少頃即開矣巳藥梅花冰片一克雄黃精六克焰硝要黑槍硝煅更佳四十五克按焰硝即火硝巳藥之性與申藥同論其功更速如痛腫者先用巳藥後用申藥吹之治單雙蛾初起一二日用此藥開痰即愈未潰可用已潰不可用孕婦忌午藥川黃連三克明礬三克牙皂三克去皮放新瓦上焙存性共研末吹患處吹藥時扶好病人囑其垂頭流去痰涎其藥不可多用如聲似雷音以溫水調藥徐徐漱之治喉中痰壅其功與辰藥同但其性太猛不宜輕用不如用辰藥平穩臨時看症酌之孕婦忌用未藥雄黃精六克朴硝十五克硼砂六克研末如喉嚨緊閉不能吹藥用此藥吹入鼻孔內其口即開開後或點或刺或消腫用巳申之藥如腐爛則用子藥一切喉症皆可用申藥玄明粉三十克雄黃精三克去痰消腫不剛不柔神妙莫測孕婦及虛弱人病勢沉重者皆不可用酉藥雞內金三克要不落水者瓦上焙乾為末梅冰片點三克研末吹患處可止痛如腐爛疼痛加子藥若要收口加兒茶六克戍藥硼砂六克玄明粉六克青鹽三克用火煅紅放在地上越一日去火毒研末擦重舌蓮花舌名紫雪丹餘症不可用亥藥巴豆二十一粒生明礬三十克入銀罐內滾之看礬枯去巴豆每三十克礬加薑黃末三克麵糊為丸用雄黃末六克為衣丸如梧桐子大每服七粒薑湯下用辰藥後可服此丸重者用之輕者不可用此丹開關竅降痰乃起死回生之靈丹也名回生丹青金錠玄胡索六克牙皂十四條去皮弦研末加青黛二克麝香點一五克水泛為丸重一點五克遇症用新汲井水磨化以綿紙條蘸藥入鼻孔內如病沉重者研末吹之中風及小兒驚風皆可用鎖匙散即巳藥去雄黃專治雙乳蛾其效如神玉鎖匙明礬三十克銀罐內溶化即下巴豆二十一粒俟礬枯取起放在地上越宿次早去巴豆用礬研末治症同上孕婦忌用綠袍散厚黃柏六十克青魚膽三十克將黃柏置火上烤乾以魚膽塗上再烤再塗以膽盡為度切片研末加入人中白六克青黛六克梅冰片六克膽礬九克硼砂六克研末治口疳疔瘡喉蛾穿方人指甲清水洗淨瓦上焙黃色為度每指甲末點三克加梅冰片點三克又方壁錢窩蜘蛛類體扁平黑褐色八足而長大如錢窠幕光白如繭用銀簪夾住向燈上燒灰研末吹之牙宣出血方七葉一枝花二克加牛膝一克梅冰片少許研末吹之如神通閉散青鹽三克白礬三克硼砂一點五克咽喉腫痛滴水不下吹之止疼走馬牙疳方梅冰片一克人中白九克煅赤砒四克黑棗七個去核將砒分作七處入棗內炭火煅煙將盡取出存性共研末用米泔水洗淨患處將藥抹上再以牛蒡子玄參防風皂角刺蔓荊子蟬蛻石膏白水煎服三劑甘桔湯生甘草苦桔梗各三十克十全大補湯當歸川芎白芍熟地人參白朮茯苓甘草黃耆肉桂三黃石膏湯即黃連解毒湯加麻黃淡豆豉地黃丸熟地二百四十克山萸肉山藥各一百二十克澤瀉茯苓丹皮各九十克為末煉蜜為丸如梧桐子大空心溫水吞服十至十五克萬靈丹當歸蒼朮川烏草烏何首烏細辛炙甘草荊芥防風川芎羌活天麻石斛雄黃麻黃全蠍法制為丸硃砂為衣薄荷湯薄荷葉十五克羌活麻黃去節甘草柴胡川芎桔梗茯苓各八克龍骨生肌散生龍骨訶子肉細茶各等分研細末干搽患處結毒紫金丹龜板放炭火上炙焦用白酒塗之再炙以焦黃為度六十克硃砂飛石決明煅紅童便焠一次各十八克研為極細末和勻爛米飯為丸如麻子大迴雪方元寸香點三克冰片點六克牙硝三克硼砂十二克研末外搽牙疳方青鹽點三克白礬三克硼砂二克冰片三克共研細末外吹患處
